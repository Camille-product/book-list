<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>かみぃの読書リスト</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=Noto+Sans+JP:wght@400;500&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #faf7f2;
      --warm-white: #fffdf9;
      --ink: #1a1714;
      --ink-light: #5a5450;
      --ink-muted: #9a928a;
      --accent: #c8573a;
      --accent-light: #f5ede9;
      --border: #e8e2d8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      line-height: 1.7;
    }

    header {
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      padding: 2.5rem 1.5rem 2rem;
      text-align: center;
    }
    .header-eyebrow {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 30px;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .site-title {
      font-family: 'Noto Serif JP', serif;
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }
    .site-desc {
      font-size: 13px;
      color: var(--ink-muted);
      max-width: 480px;
      margin: 0 auto;
    }

    nav {
      background: var(--warm-white);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      justify-content: center;
    }
    nav::-webkit-scrollbar { display: none; }
    nav a {
      text-decoration: none;
      font-size: 13px;
      color: var(--ink-light);
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    nav a:hover { background: var(--accent-light); color: var(--accent); }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
    }

    #loading {
      text-align: center;
      padding: 4rem 0;
      color: var(--ink-muted);
      font-size: 14px;
    }

    .category {
      margin-bottom: 3rem;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.5s ease forwards;
    }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .category-header {
      display: flex;
      align-items: baseline;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .category-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--ink);
    }

    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 1.25rem;
    }

    /* 7冊目以降は非表示 */
    .book-card.hidden {
      display: none;
    }

    .book-card a {
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }
    .book-cover-wrap {
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--accent-light);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .book-card:hover .book-cover-wrap {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(26, 23, 20, 0.1);
    }
    .book-cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .book-info { padding: 8px 2px 0; }
    .book-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* もっと見るボタン */
    .show-more-wrap {
      margin-top: 1.25rem;
      text-align: center;
    }
    .show-more-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--ink-light);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .show-more-btn:hover {
      background: var(--accent-light);
      color: var(--accent);
      border-color: var(--accent);
    }

    footer {
      background: var(--warm-white);
      border-top: 1px solid var(--border);
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .footer-name {
      font-family: 'Noto Serif JP', serif;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    .footer-bio {
      font-size: 12px;
      color: var(--ink-muted);
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.8;
    }
    .footer-note { font-size: 11px; color: var(--ink-muted); margin-top: 1.5rem; }

    @media (max-width: 480px) {
      .book-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 1rem; }
      nav { justify-content: flex-start; }
    }
  </style>
</head>
<body>

  <header>
    <p class="header-eyebrow">Camille's Archive</p>
    <h1 class="site-title">📚 かみぃの読書リスト</h1>
    <p class="site-desc">読んだ本や、最近読んでる本、勉強に役立った本を紹介しています</p>
  </header>

  <nav id="nav"></nav>

  <main id="main">
    <div id="loading">本棚を読み込んでいます...</div>
  </main>

  <footer>
    <p class="footer-name">👋 こんにちは、かみぃです</p>
    <p class="footer-bio">旅と語学と本が好きな社会人。英語・中国語・韓国語を勉強中。気に入ったものをnote・ブログで紹介しています。物書きとプログラマーを目指してます。</p>
    <p class="footer-note">Amazonアソシエイトに参加しています。</p>
  </footer>

  <script>
    // ============================================
    // ★ Apps Script のデプロイ URL をここに貼る ★
    // ============================================
    const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxtMszGiyXXJ1QUD7IB_zMXRVWSntWWEs9SHApdttq3TNNgLAYDXHBBIL2rxJVd6FVz/exec';

    // アソシエイトID
    const ASSOCIATE_ID = 'agenthachiwar-22';

    // 各カテゴリの最初に表示する冊数
    const SHOW_LIMIT = 6;

    // カテゴリ名と絵文字の対応
    const CATEGORY_EMOJI = {
      '自己啓発・その他': '🐈',
      '英語・英会話':     '🐈',
      '小説':             '🐈',
      '漫画':             '🐈',
    };

    // カテゴリの表示順
    const CATEGORY_ORDER = ['自己啓発・その他', '英語・英会話', '小説', '漫画'];

    function getEmoji(category) {
      return CATEGORY_EMOJI[category] || '🐈';
    }

    function buildAmazonUrl(asin) {
      return `https://www.amazon.co.jp/dp/${asin}?tag=${ASSOCIATE_ID}`;
    }

    async function loadBooks() {
      try {
        const res = await fetch(SHEET_URL);
        const books = await res.json();
        renderPage(books);
      } catch (e) {
        document.getElementById('loading').textContent =
          'データの読み込みに失敗しました。SHEET_URL を確認してください。';
      }
    }

    function renderPage(books) {
      // カテゴリでグループ化
      const categoryMap = new Map();
      for (const cat of CATEGORY_ORDER) {
        categoryMap.set(cat, []);
      }
      for (const book of books) {
        const cat = book.category || 'その他';
        if (!categoryMap.has(cat)) categoryMap.set(cat, []);
        categoryMap.get(cat).push(book);
      }

      // ナビ生成
      const nav = document.getElementById('nav');
      nav.innerHTML = '';
      for (const [cat, catBooks] of categoryMap) {
        if (catBooks.length === 0) continue;
        const a = document.createElement('a');
        a.href = `#cat-${encodeURIComponent(cat)}`;
        a.textContent = `${getEmoji(cat)} ${cat}`;
        nav.appendChild(a);
      }

      // セクション＆カード生成
      const main = document.getElementById('main');
      main.innerHTML = '';
      let delay = 0;

      for (const [cat, catBooks] of categoryMap) {
        if (catBooks.length === 0) continue;

        const section = document.createElement('section');
        section.className = 'category';
        section.id = `cat-${encodeURIComponent(cat)}`;
        section.style.animationDelay = `${delay}s`;
        delay += 0.1;

        section.innerHTML = `
          <div class="category-header">
            <h2 class="category-title">${getEmoji(cat)} ${cat}</h2>
          </div>
          <div class="book-grid"></div>
          <div class="show-more-wrap"></div>
        `;
        main.appendChild(section);

        const grid = section.querySelector('.book-grid');
        const showMoreWrap = section.querySelector('.show-more-wrap');

        // カードを生成（6冊目までは表示、7冊目以降は hidden）
        catBooks.forEach((book, index) => {
          const card = document.createElement('div');
          card.className = 'book-card' + (index >= SHOW_LIMIT ? ' hidden' : '');
          card.innerHTML = `
            <a href="${buildAmazonUrl(book.asin)}" target="_blank" rel="noopener">
              <div class="book-cover-wrap">
                <img
                  src="${book.imageUrl}"
                  alt="${book.title}"
                  onerror="this.style.opacity='0'"
                >
              </div>
              <div class="book-info">
                <p class="book-title">${book.title}</p>
              </div>
            </a>
          `;
          grid.appendChild(card);
        });

        // 7冊以上ある場合のみ「もっと見る」ボタンを表示
        if (catBooks.length > SHOW_LIMIT) {
          const btn = document.createElement('button');
          btn.className = 'show-more-btn';
          btn.textContent = `▶ もっと見る（残り${catBooks.length - SHOW_LIMIT}冊）`;
          btn.addEventListener('click', () => {
            // hidden を外して全冊表示
            grid.querySelectorAll('.book-card.hidden').forEach(card => {
              card.classList.remove('hidden');
            });
            // ボタンを非表示
            showMoreWrap.style.display = 'none';
          });
          showMoreWrap.appendChild(btn);
        }
      }
    }

    loadBooks();
  </script>

</body>
</html>
